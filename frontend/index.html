<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-container">
    <h1 class="app-title">TO DO LIST</h1>

    <div class="input-section">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="Learn Java"
      />
      <button id="addBtn" class="add-btn">Add</button>
    </div>

    <ul id="taskList" class="task-list">
      <!-- Tasks will be added here dynamically by script.js -->
    </ul>

    <p id="emptyMessage" class="empty-message">No tasks yet. Add one above!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
